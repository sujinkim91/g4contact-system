# GitHub Pages: 저장소 Settings → Pages → Source 를
# "Deploy from a branch" → Branch: main → Folder: /docs 로 지정하세요.
# (GitHub Actions 전용 소스로 두면 gh-pages/docs 반영이 안 되어 404가 납니다.)

name: Sync mockup to docs

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-docs
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy mockup → docs
        run: |
          rm -rf docs
          mkdir -p docs
          cp -R mockup/. docs/

      - name: Commit docs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No docs changes."
          else
            git commit -m "chore: sync mockup to docs (GitHub Pages)"
            git push
          fi
